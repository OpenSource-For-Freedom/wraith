# Dependabot version updates for WRAITH
# Ecosystems: NuGet (.NET 8 WPF), pip (Python scanner), GitHub Actions
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:

  # .NET 8 / NuGet — WPF front-end
  - package-ecosystem: "nuget"
    directory: "/WRAITH"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "dotnet"
    commit-message:
      prefix: "nuget"
    cooldown:
      default-days: 3
      semver-major-days: 15
      semver-minor-days: 8
      semver-patch-days: 2
      include:
        - "*"
      exclude:
        - "critical-security-patch"

  - package-ecosystem: "pip"
    directory: "/scanner"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "pip"
    cooldown:
      default-days: 3
      semver-major-days: 15
      semver-minor-days: 8
      semver-patch-days: 2
      include:
        - "*"
      exclude:
        - "critical-security-patch"

  - package-ecosystem: "actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "actions"
    cooldown:
      default-days: 3
      semver-major-days: 15
      semver-minor-days: 8
      semver-patch-days: 2
      include:
        - "*"
      exclude:
        - "critical-security-patch"

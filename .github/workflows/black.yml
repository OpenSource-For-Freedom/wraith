# black formatter 
name: Black 
on: 
  push: 
    branches: [ '**' ] 
  pull_request: 
    branches: [ main ]
jobs:
  black:  
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: 3.8
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black
      - name: Run Black
        run: |
          black . --check